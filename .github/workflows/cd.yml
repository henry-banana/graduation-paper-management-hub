# Required GitHub Secrets:
# - RENDER_BACKEND_DEPLOY_HOOK_URL
# - RENDER_FRONTEND_DEPLOY_HOOK_URL
#
# Optional GitHub Variables:
# - BACKEND_HEALTHCHECK_URL (example: https://api.example.com/api/v1/auth/health)
# - FRONTEND_HEALTHCHECK_URL (example: https://app.example.com/login)

name: cd-render-main

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-render-deploy
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BACKEND_HEALTHCHECK_URL: ${{ vars.BACKEND_HEALTHCHECK_URL }}
      FRONTEND_HEALTHCHECK_URL: ${{ vars.FRONTEND_HEALTHCHECK_URL }}
    steps:
      - name: Detect deploy mode
        id: mode
        shell: bash
        run: |
          if [ -n "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}" ] && [ -n "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}" ]; then
            echo "mode=hook" >> "$GITHUB_OUTPUT"
          else
            echo "mode=git-connected" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy mode summary
        shell: bash
        run: |
          if [ "${{ steps.mode.outputs.mode }}" = "hook" ]; then
            echo "Using Render deploy hooks from GitHub Actions"
          else
            echo "Using Render git-connected auto deploy on main"
            echo "No deploy hook secrets found, skipping hook trigger steps"
          fi

      - name: Trigger backend deploy on Render
        if: ${{ steps.mode.outputs.mode == 'hook' }}
        shell: bash
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}"

      - name: Trigger frontend deploy on Render
        if: ${{ steps.mode.outputs.mode == 'hook' }}
        shell: bash
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}"

      - name: Wait for rollout to begin
        if: ${{ steps.mode.outputs.mode == 'hook' }}
        run: sleep 45

      - name: Verify backend health
        if: ${{ steps.mode.outputs.mode == 'hook' && env.BACKEND_HEALTHCHECK_URL != '' }}
        shell: bash
        run: |
          for attempt in 1 2 3 4 5 6; do
            if curl -fsS "$BACKEND_HEALTHCHECK_URL" >/dev/null; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Backend is not healthy yet (attempt ${attempt}/6), waiting 20s"
            sleep 20
          done
          echo "Backend health check failed after retries"
          exit 1

      - name: Verify frontend health
        if: ${{ steps.mode.outputs.mode == 'hook' && env.FRONTEND_HEALTHCHECK_URL != '' }}
        shell: bash
        run: |
          for attempt in 1 2 3 4 5 6; do
            if curl -fsS "$FRONTEND_HEALTHCHECK_URL" >/dev/null; then
              echo "Frontend health check passed"
              exit 0
            fi
            echo "Frontend is not healthy yet (attempt ${attempt}/6), waiting 20s"
            sleep 20
          done
          echo "Frontend health check failed after retries"
          exit 1
